version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - API_SECRET_KEY=${API_SECRET_KEY}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - HF_MODEL_REPO=${HF_MODEL_REPO}
      - WANDB_API_KEY=${WANDB_API_KEY}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./data/predictions.db
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - model_cache:/app/models      # persist model across restarts
      - ./data:/app/data             # persist feedback + logs
      - ./calibration:/app/calibration
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  model_cache:
  redis_data:
