name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic python-dotenv \
                      slowapi pytest httpx redis aiosqlite \
                      langdetect sqlalchemy ruff

      - name: Lint with ruff
        run: |
          ruff check api/ src/ --ignore E501,F401 || true

      - name: Test imports
        run: |
          python -c "from api.schemas import PredictionResponse; print('✓ schemas')"
          python -c "from api.auth import require_api_key; print('✓ auth')"
          python -c "from api.cache import cache; print('✓ cache')"
          python -c "from src.utils.label_map import get_class_weight_list; print('✓ label_map')"
          python -c "from src.utils.text_utils import clean_text; print('✓ text_utils')"
          python -c "from src.model.chunker import chunk_text_by_chars; print('✓ chunker')"
          python -c "from src.model.language_detect import detect_language; print('✓ lang_detect')"
